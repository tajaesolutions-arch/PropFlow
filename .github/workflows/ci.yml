name: PropFlow CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: propflow-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Confirm build output exists
        run: test -d dist

  secret-scan:
    name: Basic committed-secret guardrail
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for obvious committed secrets
        shell: bash
        run: |
          set -euo pipefail

          echo "Scanning tracked files for obvious secret values..."

          if git grep -nE '(sk_live_|sk_test_|rk_live_|SUPABASE_SERVICE_ROLE_KEY\s*=\s*[^[:space:]#]+|STRIPE_SECRET_KEY\s*=\s*[^[:space:]#]+|STRIPE_WEBHOOK_SECRET\s*=\s*[^[:space:]#]+|RESEND_API_KEY\s*=\s*[^[:space:]#]+|TWILIO_AUTH_TOKEN\s*=\s*[^[:space:]#]+)' -- ':!package-lock.json'; then
            echo "Potential committed secret found. Remove real secrets and keep only empty/example values."
            exit 1
          fi

          echo "No obvious committed secrets found."
